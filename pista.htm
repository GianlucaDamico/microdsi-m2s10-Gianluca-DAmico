<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Process Studio · Pistas</title> <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="row">
      <div class="brand">
        <b>Process Studio</b> <span>Pistas · Resolución de Casos</span> </div>

      <nav class="nav">
        <div class="btn" style="padding:8px 10px; border-radius:999px;">
          <small style="margin-right:8px; color:var(--muted);">Track</small>
          <select id="trackSel" style="border:none; background:transparent; color:var(--text); outline:none;">
            <option value="itsm">ITSM Triage</option>
            <option value="hr">HR</option>
            <option value="proc">Procurement</option>
          </select>
        </div>

        <a class="btn" href="index.html">Inicio</a>
        <a class="btn" href="feed.html">Feed</a>
        <a class="btn primary" href="lab.html">Laboratorio</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="panel">
      <b>Análisis en progreso</b>
      <div class="progress"><i id="prog"></i></div>
      <span class="footerHint">
        Desplázate horizontalmente para avanzar. Responde cada pista con un dato o condición específica del track elegido.
      </span>
    </div>
  </main>

  <main id="pistaWrap" class="pistaWrap"></main>

  <script src="assets/app.js"></script> </body>
</html>
